<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 160" fill="none">
  <!-- Column 1: dark charcoal (matches your logo) -->
  <rect x="8" y="12" width="68" height="136" rx="16" fill="#5a5870" stroke="#6e6c85" stroke-width="2"/>
  <rect x="20" y="28" width="44" height="28" rx="8" fill="#4a4860"/>
  <rect x="20" y="64" width="44" height="28" rx="8" fill="#4a4860"/>

  <!-- Column 2: light lavender with purple card -->
  <rect x="84" y="12" width="68" height="136" rx="16" fill="#ddd6f8" stroke="#bbaee0" stroke-width="2"/>
  <rect x="96" y="28" width="44" height="28" rx="8" fill="#9b74d4"/>

  <!-- Column 3: solid purple with white cards -->
  <rect x="160" y="12" width="68" height="136" rx="16" fill="#7c52d6"/>
  <rect x="172" y="28" width="44" height="28" rx="8" fill="white" opacity="0.9"/>
  <rect x="172" y="64" width="44" height="28" rx="8" fill="white" opacity="0.9"/>

  <!-- Vertical divider -->
  <line x1="252" y1="20" x2="252" y2="140" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- KANBAN text — light lavender/white for dark backgrounds -->
  <text x="272" y="105" font-family="'Inter','Arial Black',Arial,sans-serif" font-weight="900" font-size="72" letter-spacing="-1" fill="#e8e4f8">KANBAN</text>

  <!-- UNO text -->
  <text x="390" y="140" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="26" letter-spacing="10" fill="#a78bfa">UNO</text>
</svg>
